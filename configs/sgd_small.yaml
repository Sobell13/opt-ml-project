run_name: sgd_small
seed: 0
device: auto
output_dir: results

model:
  name: small_cnn
  input_channels: 1
  num_classes: 10

data:
  dataset: FashionMNIST
  data_dir: ./data
  num_workers: 2

training:
  epochs: 10
  batch_size: 64

optimizer:
  name: sgd
  learning_rate: 0.05
  momentum: 0.9
  weight_decay: 0.0005
